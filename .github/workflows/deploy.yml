# ──────────────────────────────────────────────────────────────────────────────
# DISABLED — Deployment workflow for legacy v1 monolith infrastructure.
#
# Disabled because LeaseBase now runs on the v2 microservices platform.
#
# This was the legacy v1 deploy pipeline that targeted:
#   - ECR repos:  leasebase-{env}-api          (v1 naming)
#   - Task defs:  leasebase-{env}-api-task      (v1 naming)
#   - Services:   leasebase-{env}-api-service   (v1 naming)
#   - Clusters:   leasebase-{env}-cluster       (v1 naming)
#
# The canonical deployment path is now the monorepo (leasebase_all):
#   - Workflow:   .github/workflows/dev-deploy.yml
#   - Scripts:    scripts/build_push.sh + scripts/deploy_ecs.sh
#   - Config:     services/<service>/service.yaml
#   - Naming:     leasebase-{env}-v2-*
#   - Region:     us-west-2 (enforced by assert_region guardrails)
#
# History:
#   - Created:    2026-02-08
#   - Last success: 2026-02-09 (deployed to us-west-1, v1 resources)
#   - Failing since: 2026-03-05 (TS compilation errors in Docker build)
#   - Disabled:   2026-03-10 (v2 microservices are the production runtime)
#
# See: leasebase-iac/docs/DEPLOYMENT_STANDARDS.md
# ──────────────────────────────────────────────────────────────────────────────
name: '[DISABLED] Deploy API (v1 legacy)'

# No automatic triggers. Manual dispatch only (and blocked by if: false below).
on: workflow_dispatch

jobs:
  deploy:
    # Permanently disabled — do not remove this guard.
    if: false
    name: Build and Deploy API
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          
          if [[ "$BRANCH" == "develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qa" ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == release/* ]]; then
            echo "environment=uat" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ steps.env.outputs.environment }}
        with:
          context: services/api
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/leasebase-${{ steps.env.outputs.environment }}-api:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/leasebase-${{ steps.env.outputs.environment }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download current task definition
        env:
          ENV: ${{ steps.env.outputs.environment }}
        run: |
          TASK_DEF="leasebase-${ENV}-api-task"
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition' \
            --output json > task-def.json
          
          # Remove fields that can't be used when registering a new revision
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > new-task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: new-task-def.json
          container-name: api
          image: ${{ steps.login-ecr.outputs.registry }}/leasebase-${{ steps.env.outputs.environment }}-api:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        env:
          ENV: ${{ steps.env.outputs.environment }}
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: leasebase-${{ steps.env.outputs.environment }}-api-service
          cluster: leasebase-${{ steps.env.outputs.environment }}-cluster
          wait-for-service-stability: ${{ steps.env.outputs.environment == 'prod' }}

